<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Search</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0a3d91, #1c78ff);
      color: #ffffff;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 16px 40px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 16px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    input {
      flex: 1;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: #ffffff;
      color: #0a3d91;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      min-height: 22px;
      margin-bottom: 14px;
      font-size: 14px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.16);
      border-radius: 10px;
      padding: 12px;
      max-height: 70vh;
      overflow: auto;
    }

    ol {
      margin: 0;
      padding-left: 24px;
    }

    .company-btn {
      border: none;
      background: transparent;
      color: #ffffff;
      cursor: pointer;
      text-align: left;
      padding: 4px 0;
      font-size: 15px;
      text-decoration: underline;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 8px 10px;
      font-size: 14px;
      line-height: 1.35;
    }

    .details-label {
      font-weight: bold;
      opacity: 0.95;
    }

    .details-value {
      word-break: break-word;
    }

    .details-value ul {
      margin: 0;
      padding-left: 18px;
    }

    .details-empty {
      opacity: 0.9;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Company Search</h1>

    <div class="search-row">
      <input id="promptInput" type="text" placeholder="Type your prompt (e.g. German packaging suppliers)" />
      <button id="searchBtn">Search</button>
      <button id="downloadCsvBtn" disabled>Download as CSV</button>
      <button id="downloadXlsxBtn" disabled>Download as XLSX</button>
    </div>

    <div id="status" class="status"></div>

    <div class="layout">
      <div class="panel">
        <h3>Top 20 Companies</h3>
        <ol id="resultsList"></ol>
      </div>

      <div class="panel">
        <h3>Company Details</h3>
        <div id="details" class="details-empty">Click a company name to view all available details.</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script>
    const promptInput = document.getElementById('promptInput');
    const searchBtn = document.getElementById('searchBtn');
    const downloadCsvBtn = document.getElementById('downloadCsvBtn');
    const downloadXlsxBtn = document.getElementById('downloadXlsxBtn');
    const statusEl = document.getElementById('status');
    const resultsList = document.getElementById('resultsList');
    const detailsEl = document.getElementById('details');

    let currentResults = [];
    const hiddenCompanyFields = new Set(['_filter_match', '_retrieval']);
    const CSV_SEPARATOR = ';';

    function toCsvCell(value) {
      const text = value === null || value === undefined
        ? ''
        : String(value).replace(/\u0000/g, '').normalize('NFC');
      return `"${text.replace(/"/g, '""')}"`;
    }

    function buildCsvRows(results) {
      const { headers, rows } = buildTabularData(results);
      const csvLines = [`sep=${CSV_SEPARATOR}`, headers.map(toCsvCell).join(CSV_SEPARATOR)];

      rows.forEach((row) => {
        csvLines.push(row.map(toCsvCell).join(CSV_SEPARATOR));
      });

      return csvLines.join('\r\n');
    }

    function buildTabularData(results) {
      const allKeys = new Set();
      results.forEach((item) => {
        Object.keys(item.company || {}).forEach((key) => {
          if (!hiddenCompanyFields.has(key)) {
            allKeys.add(key);
          }
        });
      });

      const orderedKeys = Array.from(allKeys).sort();
      const headers = ['rank', 'name', ...orderedKeys];

      const rows = results.map((item) => {
        const company = item.company || {};
        const row = [item.rank, item.name];
        orderedKeys.forEach((key) => {
          const val = company[key];
          if (Array.isArray(val) || (typeof val === 'object' && val !== null)) {
            row.push(JSON.stringify(val));
          } else {
            row.push(val ?? '');
          }
        });
        return row;
      });

      return { headers, rows };
    }

    function downloadCsv() {
      if (!currentResults.length) {
        setStatus('No results available to export. Run a search first.');
        return;
      }

      const csvContent = buildCsvRows(currentResults);
      const encoder = new TextEncoder();
      const utf8Bytes = encoder.encode(csvContent);
      const bomUtf8 = new Uint8Array([0xEF, 0xBB, 0xBF]);
      const blob = new Blob([bomUtf8, utf8Bytes], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      const now = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');

      link.href = url;
      link.download = `companies-${now}.csv`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);

      setStatus(`Downloaded CSV with ${currentResults.length} companies.`);
    }

    function downloadXlsx() {
      if (!currentResults.length) {
        setStatus('No results available to export. Run a search first.');
        return;
      }

      if (typeof XLSX === 'undefined') {
        setStatus('XLSX library not loaded. Please refresh and try again.');
        return;
      }

      const { headers, rows } = buildTabularData(currentResults);
      const sheetData = [headers, ...rows];
      const worksheet = XLSX.utils.aoa_to_sheet(sheetData);
      const workbook = XLSX.utils.book_new();

      XLSX.utils.book_append_sheet(workbook, worksheet, 'Companies');

      const now = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
      XLSX.writeFile(workbook, `companies-${now}.xlsx`);
      setStatus(`Downloaded XLSX with ${currentResults.length} companies.`);
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function renderList(results) {
      resultsList.innerHTML = '';
      results.forEach((item) => {
        const li = document.createElement('li');
        const btn = document.createElement('button');
        btn.className = 'company-btn';
        btn.type = 'button';
        btn.textContent = item.name;
        btn.addEventListener('click', () => {
          renderCompanyDetails(item.company);
        });
        li.appendChild(btn);
        resultsList.appendChild(li);
      });
    }

    function formatScalar(value) {
      if (value === null || value === undefined || value === '') {
        return 'N/A';
      }
      return String(value);
    }

    function renderValue(value) {
      if (value === null || value === undefined) {
        return 'N/A';
      }

      if (Array.isArray(value)) {
        if (value.length === 0) return 'N/A';
        const ul = document.createElement('ul');
        value.forEach((item) => {
          const li = document.createElement('li');
          if (typeof item === 'object' && item !== null) {
            li.textContent = JSON.stringify(item);
          } else {
            li.textContent = String(item);
          }
          ul.appendChild(li);
        });
        return ul;
      }

      if (typeof value === 'object') {
        const fragments = Object.entries(value).map(([key, val]) => `${key}: ${formatScalar(val)}`);
        return fragments.join(' | ');
      }

      return String(value);
    }

    function addDetailRow(container, label, value) {
      const labelEl = document.createElement('div');
      labelEl.className = 'details-label';
      labelEl.textContent = label;

      const valueEl = document.createElement('div');
      valueEl.className = 'details-value';
      const rendered = renderValue(value);
      if (rendered instanceof Node) {
        valueEl.appendChild(rendered);
      } else {
        valueEl.textContent = rendered;
      }

      container.appendChild(labelEl);
      container.appendChild(valueEl);
    }

    function renderCompanyDetails(company) {
      detailsEl.innerHTML = '';
      detailsEl.className = '';

      const grid = document.createElement('div');
      grid.className = 'details-grid';

      addDetailRow(grid, 'Name', company.operational_name);
      addDetailRow(grid, 'Description', company.description);
      addDetailRow(grid, 'Website', company.website);
      addDetailRow(grid, 'Country Code', company.address_country_code);
      addDetailRow(grid, 'Region', company.address_region_name);
      addDetailRow(grid, 'Town', company.address_town);
      addDetailRow(grid, 'Latitude', company.address_latitude);
      addDetailRow(grid, 'Longitude', company.address_longitude);
      addDetailRow(grid, 'Employee Count', company.employee_count);
      addDetailRow(grid, 'Revenue', company.revenue);
      addDetailRow(grid, 'Public Company', company.is_public);
      addDetailRow(grid, 'Year Founded', company.year_founded);
      addDetailRow(grid, 'Primary NAICS Code', company.primary_naics_code);
      addDetailRow(grid, 'Primary NAICS Label', company.primary_naics_label);
      addDetailRow(grid, 'Secondary NAICS', company.secondary_naics);
      addDetailRow(grid, 'Business Model', company.business_model);
      addDetailRow(grid, 'Core Offerings', company.core_offerings);
      addDetailRow(grid, 'Target Markets', company.target_markets);

      detailsEl.appendChild(grid);
    }

    async function runSearch() {
      const prompt = promptInput.value.trim();
      if (!prompt) {
        setStatus('Please enter a prompt.');
        return;
      }

      setStatus('Running Stage 1 + Stage 2...');
      resultsList.innerHTML = '';
      detailsEl.className = 'details-empty';
      detailsEl.textContent = 'Waiting for results...';
      searchBtn.disabled = true;
      downloadCsvBtn.disabled = true;
      downloadXlsxBtn.disabled = true;

      try {
        const response = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt }),
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || 'Eroare necunoscută.');
        }

        currentResults = payload.results || [];
        renderList(currentResults);

        if (currentResults.length === 0) {
          detailsEl.className = 'details-empty';
          detailsEl.textContent = 'No companies found for this prompt.';
          downloadCsvBtn.disabled = true;
          downloadXlsxBtn.disabled = true;
        } else {
          renderCompanyDetails(currentResults[0].company);
          downloadCsvBtn.disabled = false;
          downloadXlsxBtn.disabled = false;
        }

        setStatus(`Found ${currentResults.length} companies (max 20).`);
      } catch (error) {
        setStatus(error.message);
        detailsEl.className = 'details-empty';
        detailsEl.textContent = 'An error occurred while running the search.';
        downloadCsvBtn.disabled = true;
        downloadXlsxBtn.disabled = true;
      } finally {
        searchBtn.disabled = false;
      }
    }

    searchBtn.addEventListener('click', runSearch);
    downloadCsvBtn.addEventListener('click', downloadCsv);
    downloadXlsxBtn.addEventListener('click', downloadXlsx);
    promptInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        runSearch();
      }
    });
  </script>
</body>
</html>
