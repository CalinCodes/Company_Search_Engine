<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veridion — Company Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:         #f1f5f9;
      --surface:    #ffffff;
      --border:     #e2e8f0;
      --primary:    #2563eb;
      --primary-dk: #1d4ed8;
      --primary-lt: #eff6ff;
      --text:       #0f172a;
      --text-muted: #64748b;
      --accent:     #0ea5e9;
      --success:    #22c55e;
      --danger:     #ef4444;
      --radius:     10px;
      --shadow-sm:  0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow:     0 4px 6px -1px rgba(0,0,0,.08), 0 2px 4px -2px rgba(0,0,0,.06);
      --shadow-md:  0 10px 15px -3px rgba(0,0,0,.08), 0 4px 6px -4px rgba(0,0,0,.06);
    }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-logo {
      width: 28px;
      height: 28px;
      background: var(--primary);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-logo svg { fill: #fff; }

    .header-brand {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .header-brand span { color: var(--primary); }

    .header-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    .header-sub {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ── Page container ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }

    /* ── Search bar ── */
    .search-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }

    .search-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .search-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sort-select {
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      min-width: 170px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }

    .sort-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }

    .search-input-wrap {
      position: relative;
      flex: 1;
      min-width: 220px;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    input[type="text"] {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px 10px 38px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }

    input[type="text"]::placeholder { color: var(--text-muted); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: none;
      border-radius: var(--radius);
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s, box-shadow .15s, opacity .15s;
      white-space: nowrap;
    }

    .btn:disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 1px 2px rgba(37,99,235,.2);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-dk);
      box-shadow: 0 4px 8px rgba(37,99,235,.25);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1.5px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--bg);
      border-color: #c0cfe6;
    }

    /* ── Status bar ── */
    .status-bar {
      min-height: 24px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .spinner {
      display: none;
      width: 15px;
      height: 15px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }

    .spinner.active { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Two-column layout ── */
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
      align-items: start;
    }

    /* ── Panel (shared card) ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, #fafcff, var(--surface));
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .panel-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--primary-lt);
      color: var(--primary);
    }

    .panel-body {
      max-height: calc(100vh - 260px);
      overflow-y: auto;
    }

    /* ── Results list ── */
    .results-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .results-list li { border-bottom: 1px solid var(--border); }
    .results-list li:last-child { border-bottom: none; }

    .company-btn {
      width: 100%;
      background: transparent;
      border: none;
      padding: 11px 16px;
      text-align: left;
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background .12s;
    }

    .company-btn:hover { background: var(--primary-lt); }
    .company-btn.active { background: var(--primary-lt); }

    .rank-badge {
      min-width: 22px;
      height: 22px;
      border-radius: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .company-btn.active .rank-badge {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .company-name { flex: 1; font-weight: 500; }

    /* ── Empty & placeholder states ── */
    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-muted);
    }

    .empty-icon {
      width: 40px;
      height: 40px;
      margin: 0 auto 12px;
      opacity: .35;
    }

    .empty-state p {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
    }

    /* ── Company details ── */
    .details-grid {
      padding: 16px;
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 0;
    }

    .detail-row {
      display: contents;
    }

    .detail-row > div {
      padding: 9px 8px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      line-height: 1.45;
    }

    .detail-row:last-child > div { border-bottom: none; }

    .detail-label {
      font-weight: 600;
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .detail-value { color: var(--text); word-break: break-word; }

    .detail-value a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .detail-value a:hover { text-decoration: underline; }

    .na { color: var(--text-muted); font-style: italic; }

    .tag-list { display: flex; flex-wrap: wrap; gap: 4px; }

    .tag {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
    }

    /* ── Responsive ── */
    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .panel-body { max-height: 50vh; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-logo">
      <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1Zm0 2a5 5 0 1 1 0 10A5 5 0 0 1 8 3Zm0 2a3 3 0 1 0 0 6A3 3 0 0 0 8 5Z"/></svg>
    </div>
    <span class="header-brand">Veridion <span>Search</span></span>
    <div class="header-divider"></div>
    <span class="header-sub">AI-powered company discovery</span>
  </header>

  <div class="container">

    <!-- Search card -->
    <div class="search-card">
      <div class="search-label">Find companies</div>
      <div class="search-row">
        <div class="search-input-wrap">
          <!-- Search icon -->
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="promptInput" type="text" placeholder='e.g. "German packaging suppliers with over 200 employees"' />
        </div>
        <button id="searchBtn" class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          Search
        </button>
        <button id="downloadCsvBtn" class="btn btn-secondary" disabled>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          CSV
        </button>
        <button id="downloadXlsxBtn" class="btn btn-secondary" disabled>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          XLSX
        </button>
        <select id="sortSelect" class="sort-select" title="Sort results">
          <option value="name">Sort: Company Name</option>
          <option value="revenue">Sort: Revenue</option>
          <option value="employees">Sort: Employees</option>
          <option value="founded">Sort: Date Founded</option>
        </select>
      </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <span class="spinner" id="spinner"></span>
      <span id="status"></span>
    </div>

    <!-- Main layout -->
    <div class="layout">

      <!-- Left panel: results list -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Results</span>
          <span class="panel-badge" id="countBadge" style="display:none"></span>
        </div>
        <div class="panel-body">
          <div id="resultsContainer">
            <div class="empty-state">
              <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <p>Enter a prompt above to<br>discover matching companies.</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Right panel: company details -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Company Details</span>
        </div>
        <div class="panel-body">
          <div id="detailsContainer">
            <div class="empty-state">
              <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/>
              </svg>
              <p>Select a company from the list<br>to view its details.</p>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const promptInput     = document.getElementById('promptInput');
    const searchBtn       = document.getElementById('searchBtn');
    const downloadCsvBtn  = document.getElementById('downloadCsvBtn');
    const downloadXlsxBtn = document.getElementById('downloadXlsxBtn');
    const sortSelect      = document.getElementById('sortSelect');
    const statusEl        = document.getElementById('status');
    const spinner         = document.getElementById('spinner');
    const resultsContainer = document.getElementById('resultsContainer');
    const detailsContainer = document.getElementById('detailsContainer');
    const countBadge      = document.getElementById('countBadge');

    let currentResults  = [];
    let activeBtn       = null;
    let currentSort     = 'name';

    /* ── utilities ── */
    function setStatus(text, loading = false) {
      statusEl.textContent = text;
      spinner.classList.toggle('active', loading);
    }

    /* ── downloads ── */
    async function requestPaidDownload(format) {
      if (!currentResults.length) { setStatus('No results to export.'); return; }

      downloadCsvBtn.disabled = true;
      downloadXlsxBtn.disabled = true;
      setStatus(`Redirecting to secure checkout for ${format.toUpperCase()} export...`, true);

      try {
        const res = await fetch('/api/create-checkout-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ format, results: currentResults }),
        });
        const payload = await res.json();
        if (!res.ok) throw new Error(payload.error || 'Failed to create checkout session.');
        if (!payload.checkout_url) throw new Error('Stripe checkout URL is missing.');
        window.location.assign(payload.checkout_url);
      } catch (err) {
        setStatus(err.message);
        downloadCsvBtn.disabled = false;
        downloadXlsxBtn.disabled = false;
        spinner.classList.remove('active');
      }
    }

    async function confirmPaymentAndDownload(token, sessionId) {
      setStatus('Verifying payment and preparing secure download...', true);
      try {
        const res = await fetch('/api/confirm-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, session_id: sessionId }),
        });
        const payload = await res.json();
        if (!res.ok) throw new Error(payload.error || 'Unable to verify payment.');
        if (!payload.download_url) throw new Error('Download URL missing after payment confirmation.');

        const cleanUrl = `${window.location.origin}${window.location.pathname}`;
        window.history.replaceState({}, '', cleanUrl);
        setStatus('Payment confirmed. Download started.');
        window.location.assign(payload.download_url);
      } catch (err) {
        setStatus(err.message);
      } finally {
        spinner.classList.remove('active');
      }
    }

    function handlePaymentReturn() {
      const params = new URLSearchParams(window.location.search);
      const paymentState = params.get('payment');

      if (paymentState === 'cancel') {
        const cleanUrl = `${window.location.origin}${window.location.pathname}`;
        window.history.replaceState({}, '', cleanUrl);
        setStatus('Checkout canceled. No payment was captured.');
        return;
      }

      if (paymentState !== 'success') return;

      const token = params.get('token');
      const sessionId = params.get('session_id');
      if (!token || !sessionId) {
        setStatus('Missing payment confirmation details. Please retry checkout.');
        return;
      }

      confirmPaymentAndDownload(token, sessionId);
    }

    function isMissing(v) {
      return v == null || v === '';
    }

    function toNumberOrNull(v) {
      if (isMissing(v)) return null;
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function compareWithNullBottom(aVal, bVal, compareNonNull) {
      const aMissing = isMissing(aVal);
      const bMissing = isMissing(bVal);
      if (aMissing && bMissing) return 0;
      if (aMissing) return 1;
      if (bMissing) return -1;
      return compareNonNull(aVal, bVal);
    }

    function sortResults(results, mode) {
      const sorted = [...results];

      sorted.sort((a, b) => {
        const aCo = a.company || {};
        const bCo = b.company || {};

        if (mode === 'name') {
          const aName = a.name || aCo.operational_name;
          const bName = b.name || bCo.operational_name;
          return compareWithNullBottom(aName, bName, (x, y) =>
            String(x).localeCompare(String(y), undefined, { sensitivity: 'base' })
          );
        }

        if (mode === 'revenue') {
          const aRev = toNumberOrNull(aCo.revenue);
          const bRev = toNumberOrNull(bCo.revenue);
          return compareWithNullBottom(aRev, bRev, (x, y) => y - x);
        }

        if (mode === 'employees') {
          const aEmp = toNumberOrNull(aCo.employee_count);
          const bEmp = toNumberOrNull(bCo.employee_count);
          return compareWithNullBottom(aEmp, bEmp, (x, y) => y - x);
        }

        if (mode === 'founded') {
          const aYear = toNumberOrNull(aCo.year_founded);
          const bYear = toNumberOrNull(bCo.year_founded);
          return compareWithNullBottom(aYear, bYear, (x, y) => y - x);
        }

        return 0;
      });

      return sorted;
    }

    function applySortAndRender() {
      const sorted = sortResults(currentResults, currentSort);
      renderList(sorted);

      if (sorted.length) {
        renderCompanyDetails(sorted[0].company);
      } else {
        detailsContainer.innerHTML = `<div class="empty-state"><p>No companies found.</p></div>`;
      }
    }

    /* ── rendering ── */
    function renderList(results) {
      if (!results.length) {
        resultsContainer.innerHTML = `
          <div class="empty-state">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <p>No companies matched your search.<br>Try broadening the query.</p>
          </div>`;
        countBadge.style.display = 'none';
        return;
      }

      const ol = document.createElement('ol');
      ol.className = 'results-list';

      results.forEach((item, i) => {
        const li  = document.createElement('li');
        const btn = document.createElement('button');
        btn.type      = 'button';
        btn.className = 'company-btn' + (i === 0 ? ' active' : '');

        btn.innerHTML = `
          <span class="rank-badge">${i + 1}</span>
          <span class="company-name">${escHtml(item.name)}</span>`;

        btn.addEventListener('click', () => {
          if (activeBtn) activeBtn.classList.remove('active');
          btn.classList.add('active');
          activeBtn = btn;
          renderCompanyDetails(item.company);
        });

        if (i === 0) activeBtn = btn;
        li.appendChild(btn);
        ol.appendChild(li);
      });

      resultsContainer.innerHTML = '';
      resultsContainer.appendChild(ol);
      countBadge.textContent = results.length;
      countBadge.style.display = '';
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    const FIELD_DEFS = [
      { key: 'operational_name',     label: 'Name' },
      { key: 'website',              label: 'Website', link: true },
      { key: 'description',          label: 'Description' },
      { key: 'address_country_name', label: 'Country' },
      { key: 'address_region_name',  label: 'Region' },
      { key: 'address_town',         label: 'City' },
      { key: 'year_founded',         label: 'Founded' },
      { key: 'employee_count',       label: 'Employees' },
      { key: 'revenue',              label: 'Revenue' },
      { key: 'is_public',            label: 'Public' },
      { key: 'business_model',       label: 'Business Model' },
      { key: 'primary_naics_label',  label: 'Industry' },
      { key: 'primary_naics_code',   label: 'NAICS Code' },
      { key: 'secondary_naics',      label: 'Secondary NAICS' },
      { key: 'core_offerings',       label: 'Core Offerings' },
      { key: 'target_markets',       label: 'Target Markets' },
    ];

    function renderCompanyDetails(company) {
      const grid = document.createElement('div');
      grid.className = 'details-grid';

      FIELD_DEFS.forEach(({ key, label, link }) => {
        let val = company[key];
        if (key === 'address_country_name' && (val == null || val === '')) {
          val = company.address_country_code;
        }
        const row = document.createElement('div');
        row.className = 'detail-row';

        const labelEl = document.createElement('div');
        labelEl.className = 'detail-label';
        labelEl.textContent = label;

        const valueEl = document.createElement('div');
        valueEl.className = 'detail-value';
        appendValue(valueEl, val, link, key);

        row.appendChild(labelEl);
        row.appendChild(valueEl);
        grid.appendChild(row);
      });

      detailsContainer.innerHTML = '';
      detailsContainer.appendChild(grid);
    }

    function appendValue(el, value, asLink, fieldKey) {
      if (value == null || value === '') {
        el.innerHTML = '<span class="na">—</span>';
        return;
      }

      if (Array.isArray(value)) {
        if (!value.length) { el.innerHTML = '<span class="na">—</span>'; return; }
        const wrap = document.createElement('div');
        wrap.className = 'tag-list';
        value.forEach(item => {
          const tag = document.createElement('span');
          tag.className = 'tag';
          tag.textContent = typeof item === 'object' ? JSON.stringify(item) : String(item);
          wrap.appendChild(tag);
        });
        el.appendChild(wrap);
        return;
      }

      if (typeof value === 'object') {
        el.textContent = Object.entries(value).map(([k,v]) => `${k}: ${v ?? '—'}`).join(' · ');
        return;
      }

      if (asLink && String(value).startsWith('http')) {
        const a = document.createElement('a');
        a.href   = String(value);
        a.target = '_blank';
        a.rel    = 'noopener noreferrer';
        a.textContent = String(value).replace(/^https?:\/\//,'').replace(/\/$/,'');
        el.appendChild(a);
        return;
      }

      el.textContent = String(value);
    }

    /* ── search ── */
    async function runSearch() {
      const prompt = promptInput.value.trim();
      if (!prompt) { setStatus('Please enter a search prompt.'); return; }

      setStatus('Searching…', true);
      renderListLoading();
      detailsContainer.innerHTML = `
        <div class="empty-state">
          <p>Waiting for results…</p>
        </div>`;

      searchBtn.disabled = downloadCsvBtn.disabled = downloadXlsxBtn.disabled = true;

      try {
        const res     = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt }),
        });
        const payload = await res.json();
        if (!res.ok) throw new Error(payload.error || 'Unknown error.');

        currentResults = payload.results || [];
        applySortAndRender();

        if (currentResults.length) {
          downloadCsvBtn.disabled = downloadXlsxBtn.disabled = false;
          setStatus(`Found ${currentResults.length} matching compan${currentResults.length === 1 ? 'y' : 'ies'}.`);
        } else {
          detailsContainer.innerHTML = `<div class="empty-state"><p>No companies found.</p></div>`;
          setStatus('No results returned for this query.');
        }
      } catch (err) {
        setStatus(err.message);
        detailsContainer.innerHTML = `
          <div class="empty-state">
            <p style="color:#ef4444">An error occurred during the search.<br>${escHtml(err.message)}</p>
          </div>`;
      } finally {
        searchBtn.disabled = false;
        spinner.classList.remove('active');
      }
    }

    function renderListLoading() {
      resultsContainer.innerHTML = `
        <div class="empty-state">
          <p>Loading results…</p>
        </div>`;
      countBadge.style.display = 'none';
    }

    /* ── event listeners ── */
    searchBtn.addEventListener('click', runSearch);
    downloadCsvBtn.addEventListener('click', () => requestPaidDownload('csv'));
    downloadXlsxBtn.addEventListener('click', () => requestPaidDownload('xlsx'));
    sortSelect.addEventListener('change', () => {
      currentSort = sortSelect.value;
      applySortAndRender();
    });
    promptInput.addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });

    handlePaymentReturn();
  </script>
</body>
</html>
